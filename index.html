<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h2>Parking Dashboard</h2>
            <div class="header-buttons">
                <button id="btnToggleHistory" class="btn-history-toggle">Lihat Riwayat</button>          
                <button id="btnLogout" class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div id="inputSection" class="input-section">
            <input type="text" id="plateNumber" placeholder="Plat Nomor Mobil">
            <select id="slotSelect">
                <!-- TAMBAH AREA BARU DI SINI -->
                <option value="A1">Area A1 (0/10)</option>
                <option value="A2">Area A2 (0/10)</option>
                <option value="B1">Area B1 (0/10)</option>
                <option value="B2">Area B2 (0/10)</option>
            </select>
            <select id="packageSelect">
                <option value="harian">Harian</option>
                <option value="mingguan">Mingguan</option>
                <option value="bulanan">Bulanan</option>
            </select>
            <button id="btnCheckIn">Check-In</button>
        </div>

        <div class="grid-parking" id="parkingGrid"></div>

        <div id="historySection" class="history-section" style="display: none;">
            <hr>
            <div class="history-header">
                <h3>Riwayat Parkir Selesai</h3>
                <button id="btnClearAll" class="btn-clear-all">Hapus Semua Riwayat</button>
            </div>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Plat Nomor</th>
                        <th>Slot</th>
                        <th>Masuk</th>
                        <th>Keluar</th>
                        <th>Total Biaya</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div id="receiptHarga" class="harga">
        <div class="harga-content">
            <div class="receipt-header">
                <h3>STRUK PARKIR DIGITAL</h3>
            </div>
            <hr>
            <div id="receiptBody"></div>
            <hr>
            <button onclick="closeHarga()" class="btn-close">Tutup & Selesai</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
